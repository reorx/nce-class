name: Build and Deploy

# push master → build 镜像（server + web/dist 同一镜像）→ push ghcr →
# 用 digest 调 hookploy 部署（deploy 工作区 hookploy.yaml 的 nce-class 流水线：
# 按 digest pin 镜像、抽 webdist 给宿主 Caddy、migrate、compose up、healthcheck）。
# miniapp 不走 CI：weapp 上传始终在本地跑（密钥在本地 tmp/）。
on:
  push:
    branches:
      - master
    paths-ignore:
      - 'kb/**'
      - 'miniapp/**'
      - '**.md'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # The digest lets the server pull content-addressed (immune to the ghcr
      # :latest tag-propagation race). hookploy returns 202 immediately (async):
      # CI green ≠ deploy success — check `hookploy deploys nce-class`.
      # HOOKPLOY_URL is a secret too (public repo: keep the infra domain out),
      # base URL without path.
      - name: Trigger hookploy deploy
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.HOOKPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"digest": "${{ steps.build.outputs.digest }}"}' \
            "${{ secrets.HOOKPLOY_URL }}/hooks/nce-class"
